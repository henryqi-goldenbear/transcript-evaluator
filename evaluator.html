<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Evaluator</title>
  <script src="./config.js" onerror="void 0"></script>
  <script src="./analytics.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header { width: 100%; max-width: 780px; margin-bottom: 28px; text-align: center; }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }


    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 12px 14px;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
    }

    select option { background: #1e2130; }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    .optional-label {
      font-size: 0.72rem;
      color: #475569;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
    }

    .controls {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .controls .field.grow { flex: 1; min-width: 200px; }
    .controls .field.mid  { width: 200px; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-text { color: #f87171; }

    .status-row {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 14px;
      display: flex;
      align-items: center;
    }

    .batch-log {
      margin-top: 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      max-height: 320px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #6366f1;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Transcript Evaluator</h1>
</header>
<div class="card">
  <div class="controls">
    <div class="field grow">
      <label for="model-select">Model</label>
      <select id="model-select">
        <optgroup label="Gemma - free - higher RPM">
          <option value="gemma-4-26b-a4b-it" selected>gemma-4-26b-a4b-it (Gemma 4 26B - stable)</option>
        </optgroup>
        <optgroup label="Gemini 2.5 Flash - free - 20 RPM">
          <option value="gemini-2.5-flash">gemini-2.5-flash (stable)</option>
          <option value="gemini-2.5-flash-preview-05-20">gemini-2.5-flash-preview-05-20</option>
        </optgroup>
        <optgroup label="Gemini 2.5 Pro - free - 5 RPM">
          <option value="gemini-2.5-pro">gemini-2.5-pro (stable)</option>
          <option value="gemini-2.5-pro-preview-05-06">gemini-2.5-pro-preview-05-06</option>
        </optgroup>
      </select>
    </div>
    <div class="field mid">
      <label for="batch-size-input">Batch size (1-7)</label>
      <input id="batch-size-input" type="number" min="1" max="7" value="3" style="width:100%;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-size:0.9rem;padding:12px 14px;" />
    </div>
    <div class="field grow">
      <label for="batch-file-input">Input JSON file</label>
      <input id="batch-file-input" type="text" value="entire_interview.json" placeholder="entire_interview.json" style="width:100%;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-size:0.9rem;padding:12px 14px;" />
    </div>
    <div class="field mid">
      <label for="debug-mode-input">Debug mode</label>
      <input id="debug-mode-input" type="checkbox" style="width:auto;transform:scale(1.2);accent-color:#6366f1;padding:0;" />
    </div>
    <button id="run-entire-btn" type="button">Run JSON batch</button>
    <button id="stop-entire-btn" type="button" disabled style="background:#334155;">Stop batch</button>
  </div>
  <div class="status-row" id="batch-status-row"></div>
  <div class="batch-log" id="batch-log">Batch run log will appear here.</div>
</div>

<script src="./rubrics.js"></script>
<script src="./log.js"></script>
<script src="./pdf.js"></script>
<script src="./gemini.js"></script>
<script src="./evaluator-app.js"></script>
<script>
  EvaluatorApp.init();
</script>

</body>
</html>
