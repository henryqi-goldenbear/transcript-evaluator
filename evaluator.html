<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Evaluator</title>
  <script src="./config.js" onerror="void 0"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    header p a { color: #818cf8; text-decoration: none; }
    header p a:hover { text-decoration: underline; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    textarea, select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    textarea:focus, select:focus {
      outline: none;
      border-color: #6366f1;
    }

    select option { background: #1e2130; }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    .optional-label {
      font-size: 0.72rem;
      color: #475569;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
    }

    .controls {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .controls .field.grow { flex: 1; min-width: 200px; }
    .controls .field.mid  { width: 200px; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #load-status {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 12px;
      min-height: 18px;
    }

    .error-text { color: #f87171; }

    #results-card { display: none; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .results-header h2 {
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.72rem;
      background: #2d3148;
      color: #a5b4fc;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .overall-banner {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .overall-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .overall-score span { color: #6366f1; font-size: 0.85rem; font-weight: 500; }

    .overall-reasoning {
      font-size: 0.88rem;
      color: #94a3b8;
      margin-top: 6px;
      line-height: 1.5;
    }

    .dim-grid { display: flex; flex-direction: column; gap: 10px; }

    .dim-row {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .dim-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .dim-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .dim-score {
      font-size: 0.9rem;
      font-weight: 700;
      color: #93c5fd;
    }

    .dim-reasoning {
      font-size: 0.86rem;
      color: #cbd5e1;
      line-height: 1.55;
    }

    .flags-block {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #fbbf24;
    }

    .status-row {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 14px;
      display: flex;
      align-items: center;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #6366f1;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Transcript Evaluator</h1>
  <p>Scores interview responses with the same STAR / non-behavioral rubrics and models as the <a href="test_runner.html">test runner</a>. Set <code>window.GEMINI_API_KEY</code> in <code>config.js</code>.</p>
</header>

<div class="card">
  <div class="field">
    <label for="rubric-select">Rubric</label>
    <select id="rubric-select">
      <option value="behavioral">STAR (behavioral)</option>
      <option value="non_behavioral">Non-behavioral</option>
    </select>
  </div>

  <div class="field">
    <label for="question-input">Question</label>
    <textarea id="question-input" rows="2" placeholder="Interview question…"></textarea>
  </div>

  <div class="field">
    <label for="response-input">Candidate response</label>
    <textarea id="response-input" rows="8" placeholder="Paste the candidate's answer…"></textarea>
  </div>

  <div class="field">
    <label for="follow-up-input">Follow-up question <span class="optional-label">(optional)</span></label>
    <textarea id="follow-up-input" rows="2" placeholder="Follow-up question, if any…"></textarea>
  </div>

  <div class="field">
    <label for="follow-up-response-input">Follow-up response <span class="optional-label">(optional)</span></label>
    <textarea id="follow-up-response-input" rows="4" placeholder="Candidate's follow-up answer…"></textarea>
  </div>

  <div class="controls">
    <div class="field grow">
      <label for="model-select">Model</label>
      <select id="model-select">
        <optgroup label="Gemma — free · higher RPM">
          <option value="gemma-4-31b-it" selected>gemma-4-31b-it (Gemma 4 31B)</option>
          <option value="gemma-4-26b-a4b-it">gemma-4-26b-a4b-it (Gemma 4 26B — stable)</option>
        </optgroup>
        <optgroup label="Gemini 2.5 Flash — free · 20 RPM">
          <option value="gemini-2.5-flash">gemini-2.5-flash (stable)</option>
          <option value="gemini-2.5-flash-preview-05-20">gemini-2.5-flash-preview-05-20</option>
        </optgroup>
        <optgroup label="Gemini 2.5 Pro — free · 5 RPM">
          <option value="gemini-2.5-pro">gemini-2.5-pro (stable)</option>
          <option value="gemini-2.5-pro-preview-05-06">gemini-2.5-pro-preview-05-06</option>
        </optgroup>
      </select>
    </div>
    <button id="run-btn" type="button" disabled>Evaluate</button>
  </div>

  <div id="load-status">Loading rubrics…</div>
</div>

<div class="card" id="results-card">
  <div class="results-header">
    <h2>Evaluation</h2>
    <div class="meta-tags">
      <span class="tag" id="tag-rubric"></span>
      <span class="tag" id="tag-model"></span>
    </div>
  </div>
  <div class="overall-banner">
    <div class="overall-score"><span id="overall-value">—</span>/10 <span>[calculated]</span></div>
    <div class="overall-reasoning" id="overall-reasoning"></div>
  </div>
  <div class="dim-grid" id="dim-grid"></div>
  <div class="flags-block" id="flags-block" style="display:none"></div>
  <div class="status-row" id="status-row"></div>
</div>

<script>
// ── Rubrics (loaded from markdown) ────────────────────────────────────────────

let BEHAVIORAL_RUBRIC_MD = "";
let NON_BEHAVIORAL_RUBRIC_MD = "";

function buildStarPrompt() {
  return `You are an expert behavioral interview evaluator using the STAR rubric.

Use the rubric below as the source of truth:

${BEHAVIORAL_RUBRIC_MD}

CALIBRATION:
- Avoid leniency bias. Score what is explicitly present, not what might be implied.
- Do not let fluent writing inflate weak content.
- Score each dimension independently.

Return only this JSON, no extra text:
{
  "filler":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "context": { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "action":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "result":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "flags":   [],
  "overall": { "score": 0.0, "reasoning": "<one sentence summary>" }
}`;
}

function buildNonBehavioralPrompt() {
  return `You are an expert interviewer evaluator for non-behavioral prompts.

Use the rubric below as the source of truth:

${NON_BEHAVIORAL_RUBRIC_MD}

CALIBRATION:
- Avoid leniency bias. Score only evidence present in the response.
- Do not inflate relevance for generic, role-agnostic answers.
- Omit self_awareness when question type does not require it.

Return only this JSON, no extra text:
{
  "clarity":        { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "relevance":      { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "specificity":    { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "self_awareness": { "score": <1-5>, "reasoning": "<one clear sentence>" },
  "flags":          [],
  "overall":        { "score": 0.0, "reasoning": "<one sentence summary>" }
}`;
}

function buildUserMessage(input) {
  const label = input.rubric_type === "non_behavioral" ? "non-behavioral" : "STAR";
  let txt = `Question: ${input.question}\nCandidate response:\n${input.response}`;
  if (input.follow_up) txt += `\nFollow-up question: ${input.follow_up}`;
  if (input.follow_up_response) txt += `\nCandidate follow-up response: ${input.follow_up_response}`;
  return `Evaluate this ${label} interview case.\n\n${txt}`;
}

// ── Gemini / Gemma API (same as test_runner.html) ─────────────────────────────

function extractJson(text) {
  const cleaned = text.replace(/^\s*[*-]\s+/gm, "");
  const fenced = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenced) return fenced[1].trim();
  const start = cleaned.indexOf("{");
  if (start !== -1) {
    let depth = 0;
    for (let i = start; i < cleaned.length; i++) {
      const ch = cleaned[i];
      if (ch === "{") depth++;
      if (ch === "}") {
        depth--;
        if (depth === 0) return cleaned.slice(start, i + 1);
      }
    }
  }
  return cleaned.trim();
}

async function callGemini(apiKey, model, systemPrompt, userMsg) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const isGemma = model.startsWith("gemma-");
  const generationConfig = { temperature: 0.15 };
  if (!isGemma) generationConfig.responseMimeType = "application/json";

  const body = isGemma
    ? {
        contents: [{
          role: "user",
          parts: [{ text: `${systemPrompt}\n\n---\n\n${userMsg}` }]
        }],
        generationConfig
      }
    : {
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userMsg }] }],
        generationConfig
      };

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { msg = (await res.json()).error?.message || msg; } catch (_) {}
    throw new Error(msg);
  }

  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts ?? [];
  const visibleParts = parts.filter(
    p => !p?.thought && typeof p?.text === "string" && p.text.trim()
  );
  const text =
    visibleParts[visibleParts.length - 1]?.text ??
    parts[parts.length - 1]?.text;
  if (!text) throw new Error("Empty response from API.");
  return isGemma ? extractJson(text) : text;
}

function parseRetryMs(msg) {
  const m = msg.match(/retry in ([\d.]+)s/i);
  if (m) return Math.ceil(parseFloat(m[1]) * 1000) + 2500;
  return 65000;
}

async function sleepCountdown(ms, el) {
  const end = Date.now() + ms;
  while (Date.now() < end) {
    const secs = Math.ceil((end - Date.now()) / 1000);
    el.textContent = `Rate limited — waiting ${secs}s…`;
    await new Promise(r => setTimeout(r, Math.min(1000, end - Date.now())));
  }
}

async function callGeminiWithRetry(apiKey, model, prompt, userMsg, statusEl) {
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      if (attempt > 0) statusEl.textContent = "Retrying…";
      else statusEl.innerHTML = '<span class="spinner"></span> Calling model…';
      return await callGemini(apiKey, model, prompt, userMsg);
    } catch (err) {
      const isRateLimit =
        err.message.includes("quota") ||
        err.message.includes("429") ||
        err.message.includes("RESOURCE_EXHAUSTED") ||
        err.message.toLowerCase().includes("retry in");
      if (!isRateLimit || attempt >= 2) throw err;
      await sleepCountdown(parseRetryMs(err.message), statusEl);
    }
  }
}

function strictJsonPrompt(basePrompt) {
  return `${basePrompt}

CRITICAL OUTPUT RULES:
- Return valid JSON only.
- Output must begin with "{" and end with "}".
- No markdown, no bullets, no prose, no code fences.`;
}

function tryParseModelJson(rawText) {
  const candidate = extractJson((rawText || "").trim());
  return JSON.parse(candidate);
}

async function evaluateCase(apiKey, model, prompt, userMsg, statusEl) {
  let modelUsed = model;
  let raw;

  try {
    raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, userMsg, statusEl);
  } catch (err) {
    const internal = String(err.message || err).toLowerCase().includes("internal error");
    if (model === "gemma-4-31b-it" && internal) {
      modelUsed = "gemma-4-26b-a4b-it";
      statusEl.textContent = "Gemma-4 unstable, falling back to Gemma-4-26b…";
      raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, userMsg, statusEl);
    } else {
      throw err;
    }
  }

  try {
    return { parsed: tryParseModelJson(raw), modelUsed };
  } catch (_) {
    statusEl.textContent = "Repairing format (JSON-only retry)…";
    const rawRetry = await callGeminiWithRetry(
      apiKey,
      modelUsed,
      strictJsonPrompt(prompt),
      userMsg,
      statusEl
    );
    return { parsed: tryParseModelJson(rawRetry), modelUsed };
  }
}

// ── Scoring helpers (same as test_runner.html) ────────────────────────────────

const STAR_DIMS = ["filler", "context", "action", "result"];
const DIM_LABELS = {
  filler: "Filler & repetition",
  context: "Context",
  action: "Action",
  result: "Result",
  clarity: "Clarity",
  relevance: "Relevance",
  specificity: "Specificity",
  self_awareness: "Self-awareness"
};

function getDims(tc, parsed) {
  if (tc.rubric_type === "non_behavioral") {
    const base = ["clarity", "relevance", "specificity"];
    if (parsed && "self_awareness" in parsed) base.push("self_awareness");
    return base;
  }
  return STAR_DIMS;
}

function computeOverall(parsed, tc) {
  if (tc.rubric_type === "non_behavioral") {
    const dims = ["clarity", "relevance", "specificity", "self_awareness"].filter(d => parsed[d]);
    if (!dims.length) return 0;
    const sum = dims.reduce((s, d) => s + (parsed[d]?.score ?? 0), 0);
    return +(sum / dims.length / 5 * 10).toFixed(1);
  }
  const f = parsed.filler?.score ?? 0;
  const c = parsed.context?.score ?? 0;
  const a = parsed.action?.score ?? 0;
  const r = parsed.result?.score ?? 0;
  return +((f * 0.10 + c * 0.20 + a * 0.40 + r * 0.30) * 2).toFixed(1);
}

// ── UI ────────────────────────────────────────────────────────────────────────

function checkReady() {
  const key = (window.GEMINI_API_KEY || "").trim();
  const rubricsOk = BEHAVIORAL_RUBRIC_MD.length > 0 && NON_BEHAVIORAL_RUBRIC_MD.length > 0;
  const hasInput =
    document.getElementById("question-input").value.trim().length > 0 &&
    document.getElementById("response-input").value.trim().length > 0;
  document.getElementById("run-btn").disabled = !(rubricsOk && key.length > 10 && hasInput);
}

async function loadRubrics() {
  const status = document.getElementById("load-status");
  try {
    const [behRes, nbRes] = await Promise.all([
      fetch("./behavioral_rubric.md"),
      fetch("./non_behavioral_rubric.md"),
    ]);
    if (!behRes.ok) throw new Error(`behavioral_rubric.md HTTP ${behRes.status}`);
    if (!nbRes.ok) throw new Error(`non_behavioral_rubric.md HTTP ${nbRes.status}`);
    BEHAVIORAL_RUBRIC_MD = await behRes.text();
    NON_BEHAVIORAL_RUBRIC_MD = await nbRes.text();
    status.textContent = "Rubrics loaded. Enter question and response to evaluate.";
    checkReady();
  } catch (err) {
    status.innerHTML = `<span class="error-text">Failed to load rubrics: ${err.message}. Serve via http.server, not file://.</span>`;
  }
}

function renderResults(parsed, tc, modelUsed) {
  const rubricLabel = tc.rubric_type === "non_behavioral" ? "Non-behavioral" : "STAR";
  document.getElementById("tag-rubric").textContent = rubricLabel;
  document.getElementById("tag-model").textContent = modelUsed;

  const overall = computeOverall(parsed, tc);
  document.getElementById("overall-value").textContent = overall;
  document.getElementById("overall-reasoning").textContent =
    parsed.overall?.reasoning || "—";

  const grid = document.getElementById("dim-grid");
  grid.innerHTML = "";
  for (const dim of getDims(tc, parsed)) {
    const row = parsed[dim];
    if (!row) continue;
    const el = document.createElement("div");
    el.className = "dim-row";
    el.innerHTML = `
      <div class="dim-head">
        <span class="dim-name">${DIM_LABELS[dim] || dim}</span>
        <span class="dim-score">${row.score ?? "?"}/5</span>
      </div>
      <div class="dim-reasoning">${escapeHtml(row.reasoning || "")}</div>`;
    grid.appendChild(el);
  }

  const flags = parsed.flags ?? [];
  const flagsEl = document.getElementById("flags-block");
  if (flags.length) {
    flagsEl.style.display = "block";
    flagsEl.textContent = `Flags: ${flags.join(" | ")}`;
  } else {
    flagsEl.style.display = "none";
  }

  document.getElementById("results-card").style.display = "block";
}

function escapeHtml(s) {
  return s
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

async function runEvaluation() {
  const apiKey = (window.GEMINI_API_KEY || "").trim();
  if (!apiKey) {
    alert("Missing API key. Set window.GEMINI_API_KEY in config.js.");
    return;
  }

  const rubricType = document.getElementById("rubric-select").value;
  const question = document.getElementById("question-input").value.trim();
  const response = document.getElementById("response-input").value.trim();
  const follow_up = document.getElementById("follow-up-input").value.trim();
  const follow_up_response = document.getElementById("follow-up-response-input").value.trim();

  if (!question || !response) return;

  const input = {
    rubric_type: rubricType,
    question,
    response,
    follow_up: follow_up || undefined,
    follow_up_response: follow_up_response || undefined,
  };

  const model = document.getElementById("model-select").value;
  const prompt = rubricType === "non_behavioral"
    ? buildNonBehavioralPrompt()
    : buildStarPrompt();
  const userMsg = buildUserMessage(input);

  const btn = document.getElementById("run-btn");
  const statusEl = document.getElementById("status-row");
  btn.disabled = true;
  document.getElementById("results-card").style.display = "block";
  document.getElementById("dim-grid").innerHTML = "";
  document.getElementById("flags-block").style.display = "none";
  statusEl.innerHTML = '<span class="spinner"></span> Evaluating…';

  try {
    const { parsed, modelUsed } = await evaluateCase(apiKey, model, prompt, userMsg, statusEl);
    renderResults(parsed, input, modelUsed);
    statusEl.textContent = "Done";
  } catch (err) {
    statusEl.innerHTML = `<span class="error-text">Error: ${escapeHtml(String(err.message || err))}</span>`;
  } finally {
    btn.disabled = false;
    checkReady();
  }
}

document.getElementById("run-btn").addEventListener("click", runEvaluation);
["question-input", "response-input", "follow-up-input", "follow-up-response-input"].forEach(id => {
  document.getElementById(id).addEventListener("input", checkReady);
});
document.getElementById("rubric-select").addEventListener("change", checkReady);

document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && !document.getElementById("run-btn").disabled) {
    runEvaluation();
  }
});

loadRubrics();
</script>

</body>
</html>
