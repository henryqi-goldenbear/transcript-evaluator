<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Evaluator</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      width: 100%;
      max-width: 780px;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 780px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    textarea, select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    textarea:focus, select:focus {
      outline: none;
      border-color: #6366f1;
    }

    select option { background: #1e2130; }

    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: flex-end;
    }

    .row .field { flex: 1; }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #4f46e5; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #response-card { display: none; }

    .response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .response-header span {
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .model-tag {
      font-size: 0.75rem;
      background: #2d3148;
      color: #a5b4fc;
      padding: 3px 10px;
      border-radius: 20px;
    }

    #response-output {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 0.92rem;
      color: #cbd5e1;
      min-height: 60px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #6366f1;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      font-size: 0.82rem;
      color: #64748b;
      display: flex;
      align-items: center;
    }

    .error { color: #f87171; }
  </style>
</head>
<body>

  <header>
    <h1>Transcript Evaluator</h1>
    <p>Powered by Puter.js — no API key required</p>
  </header>

  <div class="card">
    <div class="field" style="display:none">
      <label>System Prompt</label>
      <textarea id="system-prompt" rows="5" readonly>You are an expert interview evaluator. Given an interview transcript or response, assess the candidate's performance across key dimensions: communication clarity, technical knowledge, problem-solving approach, and cultural fit. Provide a structured evaluation with strengths, areas for improvement, and an overall rating out of 10.</textarea>
    </div>

    <div class="field">
      <label>User Message</label>
      <textarea id="user-message" rows="6" placeholder="Paste the interview transcript or candidate response here..."></textarea>
    </div>

    <div class="row">
      <div class="field" style="margin-bottom:0">
        <label>Model</label>
        <select id="model-select">
          <optgroup label="⚡ Fast">
            <option value="openai/gpt-4.1-nano" selected>GPT-4.1 Nano (fastest)</option>
            <option value="openai/gpt-4.1-mini">GPT-4.1 Mini</option>
            <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="openai/gpt-5">GPT-5</option>
            <option value="openai/gpt-5-mini">GPT-5 Mini</option>
            <option value="openai/gpt-4.1">GPT-4.1</option>
            <option value="openai/gpt-4o">GPT-4o</option>
          </optgroup>
          <optgroup label="Anthropic">
            <option value="anthropic/claude-opus-4-5">Claude Opus 4.5</option>
            <option value="anthropic/claude-sonnet-4-6">Claude Sonnet 4.6</option>
          </optgroup>
          <optgroup label="Google">
            <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
          </optgroup>
          <optgroup label="Meta">
            <option value="meta/llama-4-maverick">Llama 4 Maverick</option>
          </optgroup>
          <optgroup label="DeepSeek">
            <option value="deepseek/deepseek-r1">DeepSeek R1</option>
          </optgroup>
        </select>
      </div>
      <button id="run-btn" onclick="runEvaluation()">Run</button>
    </div>
  </div>

  <div class="card" id="response-card">
    <div class="response-header">
      <span>Response</span>
      <span class="model-tag" id="model-tag"></span>
    </div>
    <div id="response-output"></div>
    <div class="status" id="status" style="margin-top:12px"></div>
  </div>

  <script>
    async function runEvaluation() {
      const systemPrompt = document.getElementById('system-prompt').value.trim();
      const userMessage = document.getElementById('user-message').value.trim();
      const model = document.getElementById('model-select').value;
      const btn = document.getElementById('run-btn');
      const output = document.getElementById('response-output');
      const status = document.getElementById('status');
      const card = document.getElementById('response-card');
      const modelTag = document.getElementById('model-tag');

      if (!userMessage) return;

      btn.disabled = true;
      card.style.display = 'block';
      output.textContent = '';
      status.innerHTML = '<span class="spinner"></span> Generating...';
      modelTag.textContent = model;

      const messages = [];
      if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
      messages.push({ role: 'user', content: userMessage });

      try {
        const resp = await puter.ai.chat(messages, { model, stream: true });
        let full = '';
        for await (const chunk of resp) {
          const text = chunk?.text ?? '';
          full += text;
          output.textContent = full;
        }
        status.innerHTML = '&#10003; Done';
      } catch (err) {
        status.innerHTML = `<span class="error">Error: ${err.message || err}</span>`;
      } finally {
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runEvaluation();
    });
  </script>

</body>
</html>
