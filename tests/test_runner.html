  <style>

    .log-label  { color: #f8fafc; font-weight: 600; }

<body>

<header>
  <h1>Test Runner</h1>
  <p>Runs <code>test_cases.json</code> through Google Gemini and compares scores against expected values.</p>
</header>

<!-- Controls -->
<div class="card">

  <!-- Main controls row -->
  <div class="controls">

    <div class="field grow">

      <select id="model-select">
        <optgroup label="Gemma — free · higher RPM">

<!-- Progress -->

<script>
// ── System prompts (loaded from markdown files) ───────────────────────────────

let BEHAVIORAL_RUBRIC_MD = "";
let NON_BEHAVIORAL_RUBRIC_MD = "";

function buildStarPrompt() {
  return `You are an expert behavioral interview evaluator using the STAR rubric.

Use the rubric below as the source of truth:

${BEHAVIORAL_RUBRIC_MD}

CALIBRATION:
- Avoid leniency bias. Score what is explicitly present, not what might be implied.
- Do not let fluent writing inflate weak content.
- Score each dimension independently.

Return only this JSON, no extra text:
{
  "filler":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "context": { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "action":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "result":  { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "flags":   [],
  "overall": { "score": 0.0, "reasoning": "<one sentence summary>" }
}`;
}

function buildNonBehavioralPrompt() {
  return `You are an expert interviewer evaluator for non-behavioral prompts.

Use the rubric below as the source of truth:

${NON_BEHAVIORAL_RUBRIC_MD}

CALIBRATION:
- Avoid leniency bias. Score only evidence present in the response.
- Do not inflate relevance for generic, role-agnostic answers.
- Omit self_awareness when question type does not require it.

Return only this JSON, no extra text:
{
  "clarity":        { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "relevance":      { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "specificity":    { "score": <1-5>, "reasoning": "<one clear sentence citing specific evidence>" },
  "self_awareness": { "score": <1-5>, "reasoning": "<one clear sentence>" },
  "flags":          [],
  "overall":        { "score": 0.0, "reasoning": "<one sentence summary>" }
}`;
}

// ── Gemini / Gemma API call ───────────────────────────────────────────────────

// responseMimeType:"application/json" is Gemini-only; Gemma returns a plain
// text response that may be wrapped in markdown fences — strip them here.
function extractJson(text) {
  const cleaned = text.replace(/^\s*[*-]\s+/gm, "");
  const fenced = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenced) return fenced[1].trim();
  // Fallback: find the first balanced { ... } JSON object.
  const start = cleaned.indexOf("{");
  if (start !== -1) {
    let depth = 0;
    for (let i = start; i < cleaned.length; i++) {
      const ch = cleaned[i];
      if (ch === "{") depth++;
      if (ch === "}") {
        depth--;
        if (depth === 0) return cleaned.slice(start, i + 1);
      }
    }
  }
  return cleaned.trim();
}

async function callGemini(apiKey, model, systemPrompt, userMsg) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const isGemma = model.startsWith("gemma-");
  const generationConfig = { temperature: 0.15 };
  if (!isGemma) generationConfig.responseMimeType = "application/json";

  // Gemma models do not support system_instruction — prepend to user message.
  const body = isGemma
    ? {
        contents: [{
          role: "user",
          parts: [{ text: `${systemPrompt}\n\n---\n\n${userMsg}` }]
        }],
        generationConfig
      }
    : {
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: "user", parts: [{ text: userMsg }] }],
        generationConfig
      };

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { msg = (await res.json()).error?.message || msg; } catch (_) {}
    throw new Error(msg);
  }

  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts ?? [];
  const visibleParts = parts.filter(
    p => !p?.thought && typeof p?.text === "string" && p.text.trim()
  );
  const text =
    visibleParts[visibleParts.length - 1]?.text ??
    parts[parts.length - 1]?.text;
  if (!text) throw new Error("Empty response from API.");
  return isGemma ? extractJson(text) : text;
}

// ── Model → recommended delay map ────────────────────────────────────────────

const MODEL_DELAYS = {

  "gemma-4-26b-a4b-it":             3000,
  "gemini-2.5-flash":               7000,
  "gemini-2.5-flash-preview-05-20": 7000,
  "gemini-2.5-pro":                 13000,
  "gemini-2.5-pro-preview-05-06":   13000,
};

// ── Rate-limit retry helpers ──────────────────────────────────────────────────

// Extract the suggested retry delay from a Gemini quota error message.
// e.g. "Please retry in 11.565148934s." → 14065 ms (+ 2.5 s buffer)
function parseRetryMs(msg) {
  const m = msg.match(/retry in ([\d.]+)s/i);
  if (m) return Math.ceil(parseFloat(m[1]) * 1000) + 2500;
  return 65000; // safe fallback if no hint found
}

// Sleep while updating a DOM element with a live countdown.
async function sleepCountdown(ms, el) {
  const end = Date.now() + ms;
  while (Date.now() < end && !cancelled) {
    const secs = Math.ceil((end - Date.now()) / 1000);
    el.textContent = `Rate limited — waiting ${secs}s…`;
    await new Promise(r => setTimeout(r, Math.min(1000, end - Date.now())));
  }
}

// Wraps callGemini with up to 2 automatic retries on rate-limit errors.
async function callGeminiWithRetry(apiKey, model, prompt, userMsg, spinner) {
  const label = spinner.querySelector("span:last-child");
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      if (attempt > 0) label.textContent = "Retrying…";
      return await callGemini(apiKey, model, prompt, userMsg);
    } catch (err) {
      const isRateLimit =
        err.message.includes("quota") ||
        err.message.includes("429")   ||
        err.message.includes("RESOURCE_EXHAUSTED") ||
        err.message.toLowerCase().includes("retry in");
      if (!isRateLimit || attempt >= 2) throw err;
      await sleepCountdown(parseRetryMs(err.message), label);
    }
  }
}

function strictJsonPrompt(basePrompt) {
  return `${basePrompt}

CRITICAL OUTPUT RULES:
- Return valid JSON only.
- Output must begin with "{" and end with "}".
- No markdown, no bullets, no prose, no code fences.`;
}

function tryParseModelJson(rawText) {
  const raw = (rawText || "").trim();
  const candidate = extractJson(raw);
  return JSON.parse(candidate);
}

// Handles model instability and non-JSON outputs:
// 1) normal call
// 2) if Gemma-4 internal error -> fallback to Gemma-4-26b
// 3) if JSON parse fails -> retry once with stricter JSON-only prompt
async function evaluateCase(apiKey, model, prompt, userMsg, spinner) {
  let modelUsed = model;
  let raw;

  try {
    raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, userMsg, spinner);
  } catch (err) {
    const internal = String(err.message || err).toLowerCase().includes("internal error");
    if (model === "gemma-4-31b-it" && internal) {
      modelUsed = "gemma-4-26b-a4b-it";
      const label = spinner.querySelector("span:last-child");
      label.textContent = "Gemma-4 unstable, falling back to Gemma-4-26b…";
      raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, userMsg, spinner);
    } else {
      throw err;
    }
  }

  try {
    return { parsed: tryParseModelJson(raw), modelUsed };
  } catch (_) {
    const label = spinner.querySelector("span:last-child");
    label.textContent = "Repairing format (JSON-only retry)…";
    const rawRetry = await callGeminiWithRetry(
      apiKey,
      modelUsed,
      strictJsonPrompt(prompt),
      userMsg,
      spinner
    );
    return { parsed: tryParseModelJson(rawRetry), modelUsed };
  }
}

function getCaseRubricType(tc) {
  return tc.rubric_type === "non_behavioral" ? "non_behavioral" : "behavioral";
}

function collectBatch(cases, startIndex, batchSize) {
  const firstType = getCaseRubricType(cases[startIndex]);
  const batch = [];
  for (let i = startIndex; i < cases.length && batch.length < batchSize; i++) {
    if (getCaseRubricType(cases[i]) !== firstType) break;
    batch.push(cases[i]);
  }
  return batch;
}

function buildBatchUserMessage(batchCases, rubricType) {
  const rubricLabel = rubricType === "non_behavioral" ? "non-behavioral" : "STAR";
  const schema = rubricType === "non_behavioral"
    ? `Return JSON only in this format:
{
  "evaluations": [
    {
      "id": <case id>,
      "clarity": {"score": <1-5>, "reasoning": "<one sentence>"},
      "relevance": {"score": <1-5>, "reasoning": "<one sentence>"},
      "specificity": {"score": <1-5>, "reasoning": "<one sentence>"},
      "self_awareness": {"score": <1-5>, "reasoning": "<one sentence>"},
      "flags": [],
      "overall": {"score": 0.0, "reasoning": "<one sentence>"}
    }
  ]
}
Rules:
- Include exactly one evaluation per case id.
- Omit self_awareness when not applicable (same rule as your rubric).
- Keep overall.score at 0.0 (it is computed externally).`
    : `Return JSON only in this format:
{
  "evaluations": [
    {
      "id": <case id>,
      "filler": {"score": <1-5>, "reasoning": "<one sentence>"},
      "context": {"score": <1-5>, "reasoning": "<one sentence>"},
      "action": {"score": <1-5>, "reasoning": "<one sentence>"},
      "result": {"score": <1-5>, "reasoning": "<one sentence>"},
      "flags": [],
      "overall": {"score": 0.0, "reasoning": "<one sentence>"}
    }
  ]
}
Rules:
- Include exactly one evaluation per case id.
- Keep overall.score at 0.0 (it is computed externally).`;

  const casesText = batchCases.map(tc => {
    let txt = `Case ID: ${tc.id}\nQuestion: ${tc.question}\nCandidate response:\n${tc.response}`;
    if (tc.follow_up) txt += `\nFollow-up question: ${tc.follow_up}`;
    if (tc.follow_up_response) txt += `\nCandidate follow-up response: ${tc.follow_up_response}`;
    return txt;
  }).join("\n\n---\n\n");

  return `Evaluate these ${rubricLabel} interview cases.\n\n${schema}\n\n${casesText}`;
}

function normalizeBatchEvaluations(parsedObj, batchCases) {
  let arr = null;

  if (Array.isArray(parsedObj)) {
    arr = parsedObj;
  } else if (parsedObj && Array.isArray(parsedObj.evaluations)) {
    arr = parsedObj.evaluations;
  } else if (parsedObj && typeof parsedObj === "object") {
    const keys = Object.keys(parsedObj);
    const numericKeys = keys.filter(k => /^\d+$/.test(k));
    if (numericKeys.length) {
      arr = numericKeys.map(k => ({ id: Number(k), ...parsedObj[k] }));
    }
  }

  if (!arr) throw new Error("Batch response missing evaluations array/object.");

  // If model omitted ids but returned same count in order, assign by order.
  const missingIds = arr.every(item => item?.id === undefined);
  if (missingIds && arr.length === batchCases.length) {
    arr = arr.map((item, idx) => ({ ...item, id: batchCases[idx].id }));
  }

  const byId = new Map();
  for (const item of arr) {
    const id = Number(item?.id);
    if (Number.isFinite(id)) byId.set(id, item);
  }
  return byId;
}

async function evaluateBatch(apiKey, model, prompt, batchCases, spinner) {
  let modelUsed = model;
  const rubricType = getCaseRubricType(batchCases[0]);
  const batchMsg = buildBatchUserMessage(batchCases, rubricType);
  let raw;

  try {
    raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, batchMsg, spinner);
  } catch (err) {
    const internal = String(err.message || err).toLowerCase().includes("internal error");
    if (model === "gemma-4-31b-it" && internal) {
      modelUsed = "gemma-4-26b-a4b-it";
      const label = spinner.querySelector("span:last-child");
      label.textContent = "Gemma-4 unstable, falling back to Gemma-4-26b…";
      raw = await callGeminiWithRetry(apiKey, modelUsed, prompt, batchMsg, spinner);
    } else {
      throw err;
    }
  }

  let parsed;
  try {
    parsed = tryParseModelJson(raw);
  } catch (_) {
    const label = spinner.querySelector("span:last-child");
    label.textContent = "Repairing batch format (JSON-only retry)…";
    const rawRetry = await callGeminiWithRetry(
      apiKey,
      modelUsed,
      strictJsonPrompt(prompt),
      batchMsg,
      spinner
    );
    parsed = tryParseModelJson(rawRetry);
  }

  return {
    modelUsed,
    evaluationsById: normalizeBatchEvaluations(parsed, batchCases),
  };
}

// ── Dimension helpers ─────────────────────────────────────────────────────────

const STAR_DIMS = ["filler", "context", "action", "result"];
const NB_DIMS   = ["clarity", "relevance", "specificity", "self_awareness"];

function getDims(tc, parsed) {
  if (tc.rubric_type === "non_behavioral") {
    // include self_awareness only if present in expected or returned by model
    const base = ["clarity", "relevance", "specificity"];
    if ("self_awareness" in tc.expected || (parsed && "self_awareness" in parsed)) {
      base.push("self_awareness");
    }
    return base;
  }
  return STAR_DIMS;
}

// ── Client-side overall formula (deterministic) ───────────────────────────────

function computeOverall(parsed, tc) {
  if (tc.rubric_type === "non_behavioral") {
    const dims = ["clarity", "relevance", "specificity", "self_awareness"].filter(d => parsed[d]);
    if (!dims.length) return 0;
    const sum = dims.reduce((s, d) => s + (parsed[d]?.score ?? 0), 0);
    return +(sum / dims.length / 5 * 10).toFixed(1);
  }
  const f = parsed.filler?.score  ?? 0;
  const c = parsed.context?.score ?? 0;
  const a = parsed.action?.score  ?? 0;
  const r = parsed.result?.score  ?? 0;
  return +((f * 0.10 + c * 0.20 + a * 0.40 + r * 0.30) * 2).toFixed(1);
}

// ── Score formatting helpers ──────────────────────────────────────────────────

function dimLabel(d) {
  const short = { filler: "fil", context: "ctx", action: "act", result: "res",
                  clarity: "cla", relevance: "rel", specificity: "spc", self_awareness: "slf" };
  return short[d] || d.slice(0, 3);
}

function scoresLine(obj, dims) {
  return dims.map(d => `${dimLabel(d)} ${obj[d]?.score ?? "?"}/5`).join("  ");
}

function deltaLine(parsed, tc, dims) {
  const exp = tc.expected;
  return dims.map(d => {
    const e = exp[d]?.score ?? 0;
    const a = parsed[d]?.score ?? 0;
    const diff = a - e;
    const cls  = diff === 0 ? "d-exact" : Math.abs(diff) === 1 ? "d-near" : "d-far";
    const sym  = diff === 0 ? "·" : diff > 0 ? `+${diff}` : `${diff}`;
    return `<span class="${cls}">${dimLabel(d)}:${sym}</span>`;
  }).join("  ");
}

function overallDeltaHtml(actOv, expOv) {
  const diff = +(actOv - expOv).toFixed(1);
  const cls  = diff === 0 ? "d-exact" : Math.abs(diff) <= 1 ? "d-near" : "d-far";
  const sym  = diff === 0 ? "·" : diff > 0 ? `+${diff}` : `${diff}`;
  return `<span class="${cls}">overall:${sym}</span>`;
}

// ── State ─────────────────────────────────────────────────────────────────────

let allCases  = [];
let cancelled = false;

// ── Load ──────────────────────────────────────────────────────────────────────

async function loadCases() {
  const status = document.getElementById("load-status");
  try {
    const [casesRes, behRes, nbRes] = await Promise.all([
      fetch("./test_cases.json"),
      fetch("./behavioral_rubric.md"),
      fetch("./non_behavioral_rubric.md"),
    ]);
    if (!casesRes.ok) throw new Error(`test_cases.json HTTP ${casesRes.status}`);
    if (!behRes.ok) throw new Error(`behavioral_rubric.md HTTP ${behRes.status}`);
    if (!nbRes.ok) throw new Error(`non_behavioral_rubric.md HTTP ${nbRes.status}`);

    allCases = await casesRes.json();
    BEHAVIORAL_RUBRIC_MD = await behRes.text();
    NON_BEHAVIORAL_RUBRIC_MD = await nbRes.text();

    status.textContent = `${allCases.length} test cases loaded. Enter your API key to run.`;
    checkReady();
  } catch (err) {
    status.innerHTML = `<span class="error-text">Failed to load required files: ${err.message}. Serve via http.server, not file://.</span>`;
  }
}

function checkReady() {
  const key = (window.GEMINI_API_KEY || "").trim();
  const ready = allCases.length > 0 && key.length > 10;
  document.getElementById("run-btn").disabled = !ready;
}

// ── Logging helpers ───────────────────────────────────────────────────────────

const logEl = () => document.getElementById("log-output");

function appendText(cls, text) {
  const span = document.createElement("span");
  span.className = cls;
  span.textContent = text;
  logEl().appendChild(span);
  logEl().scrollTop = logEl().scrollHeight;
}

function appendHtml(html) {
  const span = document.createElement("span");
  span.innerHTML = html;
  logEl().appendChild(span);
  logEl().scrollTop = logEl().scrollHeight;
}

function appendRaw(text) {
  logEl().appendChild(document.createTextNode(text));
  logEl().scrollTop = logEl().scrollHeight;
}

// ── Progress ──────────────────────────────────────────────────────────────────

function setProgress(n, total, label) {
  const pct = total ? Math.round((n / total) * 100) : 0;
  document.getElementById("progress-label").textContent =
    `Case ${n} / ${total}${label ? "  —  " + label : ""}`;
  document.getElementById("progress-pct").textContent = `${pct}%`;
  const fill = document.getElementById("progress-fill");
  fill.style.width = `${pct}%`;
  fill.style.background = n === total ? "#34d399" : "#6366f1";
}

// ── Stop ──────────────────────────────────────────────────────────────────────

function stopRun() {
  cancelled = true;
  document.getElementById("stop-btn").disabled = true;
}

// ── Summary chips ─────────────────────────────────────────────────────────────

function renderSummary(exact, near, far, errors, total) {
  const row = document.getElementById("summary-row");
  row.style.display = "flex";
  row.innerHTML = `
    <span class="chip chip-total">Total: ${total}</span>
    <span class="chip chip-pass">Exact (Δ=0): ${exact}</span>
    <span class="chip chip-warn">Near (|Δ|≤1): ${near}</span>
    <span class="chip chip-fail">Off (|Δ|≥2): ${far}</span>
    ${errors ? `<span class="chip chip-fail">Errors: ${errors}</span>` : ""}
  `;
}

function formatTs(d) {
  return d.toLocaleTimeString([], { hour12: false });
}

function formatDurationMs(ms) {
  const totalSec = Math.max(0, Math.round(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}m ${s}s`;
}

// ── Main runner ───────────────────────────────────────────────────────────────

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function runAll() {
  const apiKey = (window.GEMINI_API_KEY || "").trim();
  if (!apiKey) {
    alert("Missing API key. Set window.GEMINI_API_KEY in config.js.");
    return;
  }

  const model   = document.getElementById("model-select").value;
  const delay   = parseInt(document.getElementById("delay-input").value, 10) || 6000;
  const batchSizeInput = parseInt(document.getElementById("batch-size-input").value, 10);
  const batchSize = Number.isFinite(batchSizeInput)
    ? Math.max(1, Math.min(7, batchSizeInput))
    : 5;
  const filter  = document.getElementById("filter-select").value;

  const cases = filter === "all"
    ? allCases
    : allCases.filter(tc => (tc.rubric_type ?? "behavioral") === filter);

  if (!cases.length) { alert("No cases match that filter."); return; }

  cancelled = false;
  const total = cases.length;

  document.getElementById("run-btn").disabled  = true;
  document.getElementById("stop-btn").disabled = false;
  document.getElementById("progress-card").style.display = "block";
  document.getElementById("log-card").style.display      = "block";
  document.getElementById("summary-row").style.display   = "none";

  logEl().innerHTML = "";
  const runStart = new Date();
  appendText("log-done", `Gemini ${model}   delay: ${delay} ms   batch_size: ${batchSize}   cases: ${total}   started: ${formatTs(runStart)}\n\n`);

  let succeeded = 0, errors = 0;
  let exactAll = 0, nearAll = 0, farAll = 0;

  for (let i = 0; i < total;) {
    if (cancelled) {
      appendText("log-error", `\n⏹ Stopped at case ${i + 1} of ${total}.\n`);
      break;
    }

    const batchCases = collectBatch(cases, i, batchSize);
    const batchEnd = i + batchCases.length;
    const isNBBatch = getCaseRubricType(batchCases[0]) === "non_behavioral";
    const batchTypeLabel = isNBBatch ? "non-behavioral" : "STAR";
    const prompt = isNBBatch ? buildNonBehavioralPrompt() : buildStarPrompt();
    const batchStartTs = new Date();

    setProgress(Math.min(batchEnd, total), total, `Batch ${i + 1}-${batchEnd}`);
    appendText("log-sep", "═".repeat(70) + "\n");
    appendText("log-done", `Batch ${i + 1}-${batchEnd} (${batchTypeLabel}) start: ${formatTs(batchStartTs)}\n`);

    // One spinner for the whole batch call
    const spinner = document.createElement("span");
    spinner.innerHTML = `<span class="spinner"></span><span style="color:#475569">Evaluating batch ${i + 1}-${batchEnd}…</span>`;
    logEl().appendChild(spinner);
    logEl().scrollTop = logEl().scrollHeight;

    try {
      const { evaluationsById, modelUsed } = await evaluateBatch(apiKey, model, prompt, batchCases, spinner);
      spinner.remove();

      if (modelUsed !== model) {
        appendText("log-raw", `↳ Auto-fallback model: ${modelUsed}\n`);
      }

      for (const tc of batchCases) {
        appendText("log-sep", "─".repeat(70) + "\n");
        appendText("log-id",    `[${String(tc.id).padStart(2, "0")}] `);
        appendText("log-label", tc.label);
        appendText("log-type",  `  (${batchTypeLabel})\n`);
        appendText("log-q",     `Q: ${tc.question}\n`);

        const expDims = getDims(tc, null);
        appendText("log-expect", `✓ Expect:  ${scoresLine(tc.expected, expDims)}\n`);

        const parsed = evaluationsById.get(tc.id);
        if (!parsed || typeof parsed !== "object") {
          appendText("log-error", `↳ ERROR: Missing evaluation for case id ${tc.id} in batch response.\n`);
          errors++;
          appendRaw("\n");
          continue;
        }

        parsed._overall = computeOverall(parsed, tc);
        const actDims = getDims(tc, parsed);

        appendText("log-actual", `↳ Actual:  ${scoresLine(parsed, actDims)}`);
        appendHtml(`  <span class="badge-calc">overall: ${parsed._overall}/10 [calc]</span>\n`);

        const dHtml = deltaLine(parsed, tc, actDims);
        const oHtml = overallDeltaHtml(parsed._overall, tc.expected.overall.score);
        appendHtml(`   Δ  <span class="delta-row">${dHtml}  ${oHtml}</span>\n`);

        const expFlags = tc.expected.flags ?? [];
        const actFlags = parsed.flags ?? [];
        if (expFlags.length || actFlags.length) {
          if (expFlags.length) appendText("log-expect", `   ✓ Expected flags: ${expFlags.map(f => f.split(":")[0]).join(" | ")}\n`);
          if (actFlags.length) appendText("log-actual",  `   ↳ Model flags:    ${actFlags.map(f => f.split(":")[0]).join(" | ")}\n`);
        }

        const ovDiff = Math.abs(+(parsed._overall - tc.expected.overall.score).toFixed(1));
        if (ovDiff === 0)     { exactAll++; }
        else if (ovDiff <= 1) { nearAll++;  }
        else                  { farAll++;   }

        succeeded++;
        appendRaw("\n");
      }
    } catch (err) {
      spinner.remove();
      appendText("log-error", `↳ BATCH ERROR (${i + 1}-${batchEnd}): ${err.message || err}\n`);
      for (const tc of batchCases) {
        appendText("log-sep", "─".repeat(70) + "\n");
        appendText("log-id",    `[${String(tc.id).padStart(2, "0")}] `);
        appendText("log-label", tc.label);
        appendText("log-type",  `  (${batchTypeLabel})\n`);
        appendText("log-q",     `Q: ${tc.question}\n`);
        const expDims = getDims(tc, null);
        appendText("log-expect", `✓ Expect:  ${scoresLine(tc.expected, expDims)}\n`);
        appendText("log-error", `↳ ERROR: Batch failed before case-level parse.\n`);
        errors++;
        appendRaw("\n");
      }
    }

    const batchEndTs = new Date();
    appendText(
      "log-done",
      `Batch ${i + 1}-${batchEnd} end: ${formatTs(batchEndTs)}  duration: ${formatDurationMs(batchEndTs - batchStartTs)}\n`
    );
    appendRaw("\n");
    i = batchEnd;
    if (i < total && !cancelled) await sleep(delay);
  }

  // Finish
  setProgress(total, total, "Done");
  appendText("log-sep", "─".repeat(70) + "\n");
  const runEnd = new Date();
  appendText("log-done",
    `Finished — ${succeeded} evaluated, ${errors} errors. ended: ${formatTs(runEnd)}  elapsed: ${formatDurationMs(runEnd - runStart)}\n`
  );
  if (succeeded) {
    appendText("log-done",
      `Overall delta — exact: ${exactAll}  near (≤1): ${nearAll}  off (≥2): ${farAll}\n`
    );
  }

  renderSummary(exactAll, nearAll, farAll, errors, total);
  document.getElementById("run-btn").disabled  = false;
  document.getElementById("stop-btn").disabled = true;
}

// ── Copy log ──────────────────────────────────────────────────────────────────

function copyLog() {
  navigator.clipboard.writeText(logEl().innerText).then(() => {
    const btn = document.getElementById("copy-btn");
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────

// auto-set delay when model changes
document.getElementById("model-select").addEventListener("change", () => {
  const model = document.getElementById("model-select").value;
  if (MODEL_DELAYS[model]) {
    document.getElementById("delay-input").value = MODEL_DELAYS[model];
  }
});

loadCases();
</script>
